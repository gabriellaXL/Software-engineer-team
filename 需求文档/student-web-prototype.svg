    <circle fill="#24a36b" cx="76" cy="24" r="7"/>
    <rect fill="#ffffff" stroke="#d5deea" x="116" y="12" width="520" height="24" rx="12"/>
    <text class="text tiny muted" x="142" y="30">https://service.example.edu.cn/student</text>
    <text class="text tiny muted" x="760" y="30">Chrome / Edge / Safari</text>

    <rect class="nav" x="0" y="48" width="192" height="712" rx="0"/>
    <text class="white label" x="28" y="92">学院服务平台</text>
    <text class="white tiny" x="28" y="122">学生端网页</text>
    <rect class="nav2" x="18" y="160" width="156" height="42" rx="8"/>
