    <text class="white small" x="50" y="420">证明申请</text>
    <text class="white small" x="50" y="478">成绩分析</text>
    <text class="white tiny" x="28" y="704">普通学生</text>
    <text class="white tiny" x="28" y="730">2023120000</text>

    <rect fill="#ffffff" x="192" y="48" width="708" height="712"/>
