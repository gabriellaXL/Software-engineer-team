      <line class="line2" x1="28" y1="66" x2="216" y2="66"/>
      <circle class="accent" cx="28" cy="66" r="8"/>
      <circle class="accent" cx="90" cy="66" r="8"/>
      <circle class="primary" cx="154" cy="66" r="9"/>
      <circle fill="#ffffff" stroke="#b8c7d8" stroke-width="3" cx="216" cy="66" r="8"/>
