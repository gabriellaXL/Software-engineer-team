    <rect fill="#ffffff" stroke="#dbe4ef" x="32" y="666" width="292" height="48"/>
    <text class="text tiny" x="58" y="696">首页</text>
    <text class="text tiny muted" x="126" y="696">咨询</text>
    <text class="text tiny muted" x="196" y="696">通知</text>
    <text class="text tiny muted" x="264" y="696">我的</text>
