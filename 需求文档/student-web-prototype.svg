<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .panel { fill: #ffffff; stroke: #dbe4ef; stroke-width: 1.2; }
      .soft { fill: #eef5ff; }
      .nav { fill: #163b63; }
      .nav2 { fill: #245783; }
      .primary { fill: #1f6fbf; }
      .accent { fill: #24a36b; }
      .warn { fill: #f2a93b; }
      .danger { fill: #df5a50; }
      .muted { fill: #7a8da3; }
      .text { fill: #1d2b3a; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .white { fill: #ffffff; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
      .small { font-size: 18px; }
      .tiny { font-size: 15px; }
      .label { font-size: 20px; font-weight: 600; }
      .title { font-size: 28px; font-weight: 700; }
      .h1 { font-size: 34px; font-weight: 700; }
      .shadow { filter: drop-shadow(0 10px 24px rgba(22, 59, 99, 0.12)); }
      .line { stroke: #dbe4ef; stroke-width: 1.2; }
      .line2 { stroke: #b8c7d8; stroke-width: 1.4; }
      .dash { stroke: #b8c7d8; stroke-width: 1.4; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="980"/>

  <text class="text h1" x="64" y="64">学生端 Web 网页原型总览</text>
  <text class="text small muted" x="64" y="98">响应式浏览器访问：桌面端用于完整信息浏览，移动端用于高频查询、提醒和申请提交</text>

  <!-- Desktop web prototype -->
  <g transform="translate(64 136)">
    <rect class="panel shadow" x="0" y="0" width="900" height="760" rx="18"/>
    <rect fill="#eef2f7" x="0" y="0" width="900" height="48" rx="18"/>
