      <rect class="panel" x="0" y="92" width="112" height="72" rx="10"/>
      <text class="text tiny" x="22" y="122">通知公告</text>
      <text class="text tiny muted" x="22" y="146">未读筛选</text>
      <rect class="panel" x="140" y="92" width="112" height="72" rx="10"/>
      <text class="text tiny" x="162" y="122">证明申请</text>
