<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs><style>.bg{fill:#f7f9fc}.node{fill:#fff;stroke:#cbd7e6;stroke-width:2}.zone{fill:#eef5ff;stroke:#95bce8;stroke-width:2}.zone2{fill:#edf9f4;stroke:#8acdb8;stroke-width:2}.zone3{fill:#f5f0ff;stroke:#b4a1e8;stroke-width:2}.text{font-family:"Microsoft YaHei",Arial,sans-serif;fill:#1d2b3a}.title{font-size:30px;font-weight:700}.label{font-size:21px;font-weight:700}.small{font-size:17px}.arrow{stroke:#607488;stroke-width:2.5;marker-end:url(#a)}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#607488"/></marker></defs>
  <rect class="bg" width="1280" height="760"/><text class="text title" x="50" y="55">系统部署设计图</text>
  <rect class="zone" x="70" y="110" width="250" height="500" rx="14"/><text class="text label" x="125" y="145">客户端</text>
  <rect class="node" x="105" y="200" width="180" height="70" rx="10"/><text class="text small" x="132" y="242">移动端浏览器</text>
  <rect class="node" x="105" y="340" width="180" height="70" rx="10"/><text class="text small" x="135" y="382">PC 浏览器</text>
  <rect class="zone2" x="420" y="110" width="280" height="500" rx="14"/><text class="text label" x="486" y="145">反向代理区</text>
  <rect class="node" x="465" y="280" width="190" height="90" rx="10"/><text class="text small" x="500" y="318">Nginx</text><text class="text small" x="490" y="348">HTTPS / 静态资源</text>
  <rect class="zone3" x="780" y="110" width="430" height="500" rx="14"/><text class="text label" x="925" y="145">服务与数据区</text>
  <rect class="node" x="835" y="205" width="300" height="80" rx="10"/><text class="text small" x="918" y="238">API Gateway</text><text class="text small" x="900" y="265">业务服务集群</text>
  <rect class="node" x="835" y="345" width="300" height="80" rx="10"/><text class="text small" x="918" y="378">文件存储服务</text><text class="text small" x="890" y="405">模板 / 证明 / 上传附件</text>
  <rect class="node" x="835" y="485" width="300" height="80" rx="10"/><text class="text small" x="890" y="518">人大金仓 Kingbase</text><text class="text small" x="910" y="545">业务数据存储</text>
  <line class="arrow" x1="285" y1="235" x2="465" y2="310"/><line class="arrow" x1="285" y1="375" x2="465" y2="340"/><line class="arrow" x1="655" y1="325" x2="835" y2="245"/><line class="arrow" x1="655" y1="335" x2="835" y2="385"/><line class="arrow" x1="985" y1="285" x2="985" y2="485"/>
  <text class="text small" x="330" y="250">HTTPS</text><text class="text small" x="705" y="255">REST API</text><text class="text small" x="1010" y="450">JDBC</text>
