<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs><style>.bg{fill:#f7f9fc}.tbl{fill:#fff;stroke:#cbd7e6;stroke-width:2}.head{fill:#1f8a70}.text{font-family:"Microsoft YaHei",Arial,sans-serif;fill:#1d2b3a}.white{font-family:"Microsoft YaHei",Arial,sans-serif;fill:#fff}.title{font-size:30px;font-weight:700}.small{font-size:16px}.label{font-size:20px;font-weight:700}.line{stroke:#607488;stroke-width:2;marker-end:url(#a)}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#607488"/></marker></defs>
