<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820">
  <defs><style>.bg{fill:#f7f9fc}.cls{fill:#fff;stroke:#cbd7e6;stroke-width:2}.head{fill:#245783}.text{font-family:"Microsoft YaHei",Arial,sans-serif;fill:#1d2b3a}.white{font-family:"Microsoft YaHei",Arial,sans-serif;fill:#fff}.title{font-size:30px;font-weight:700}.small{font-size:17px}.label{font-size:20px;font-weight:700}.line{stroke:#63758a;stroke-width:2;marker-end:url(#a)}</style><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#63758a"/></marker></defs>
  <rect class="bg" width="1280" height="820"/><text class="text title" x="50" y="55">核心类设计图</text>
  <g class="text small">
    <g transform="translate(70 100)"><rect class="cls" width="210" height="150" rx="8"/><rect class="head" width="210" height="38" rx="8"/><text class="white label" x="82" y="26">User</text><text x="18" y="65">user_id</text><text x="18" y="92">role</text><text x="18" y="119">accountId</text><text x="18" y="146">status</text></g>
    <g transform="translate(370 80)"><rect class="cls" width="230" height="170" rx="8"/><rect class="head" width="230" height="38" rx="8"/><text class="white label" x="48" y="26">StudentProfile</text><text x="18" y="65">student_id</text><text x="18" y="92">student_no</text><text x="18" y="119">name / major</text><text x="18" y="146">grade / phone</text></g>
    <g transform="translate(370 300)"><rect class="cls" width="230" height="145" rx="8"/><rect class="head" width="230" height="38" rx="8"/><text class="white label" x="58" y="26">AdminProfile</text><text x="18" y="65">admin_id</text><text x="18" y="92">name</text><text x="18" y="119">department / role</text></g>
    <g transform="translate(690 70)"><rect class="cls" width="230" height="150" rx="8"/><rect class="head" width="230" height="38" rx="8"/><text class="white label" x="58" y="26">Application</text><text x="18" y="65">application_id</text><text x="18" y="92">type</text><text x="18" y="119">submit_time</text><text x="18" y="146">status</text></g>
