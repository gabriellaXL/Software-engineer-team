<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .bg{fill:#f6f8fb}.box{fill:#fff;stroke:#cfd9e6;stroke-width:2}.head{fill:#1f6fbf}.head2{fill:#1f8a70}.head3{fill:#7a5cc8}.text{font-family:"Microsoft YaHei",Arial,sans-serif;fill:#1d2b3a}.white{font-family:"Microsoft YaHei",Arial,sans-serif;fill:#fff}.title{font-size:30px;font-weight:700}.label{font-size:22px;font-weight:700}.small{font-size:18px}.arrow{stroke:#6d7f93;stroke-width:2.5;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#6d7f93"/></marker>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="text title" x="50" y="56">学院学生综合服务与党团管理平台 - 软件体系结构</text>

  <rect class="box" x="70" y="100" width="1140" height="120" rx="12"/>
  <rect class="head" x="70" y="100" width="1140" height="42" rx="12"/>
  <text class="white label" x="92" y="129">表现层 UI</text>
  <rect class="box" x="120" y="158" width="300" height="42" rx="8"/><text class="text small" x="178" y="185">学生端 Web 网页</text>
  <rect class="box" x="490" y="158" width="300" height="42" rx="8"/><text class="text small" x="548" y="185">管理员端 Web 后台</text>
  <rect class="box" x="860" y="158" width="300" height="42" rx="8"/><text class="text small" x="930" y="185">响应式浏览器</text>

  <rect class="box" x="70" y="280" width="1140" height="190" rx="12"/>
  <rect class="head2" x="70" y="280" width="1140" height="42" rx="12"/>
  <text class="white label" x="92" y="309">业务逻辑层 BLL</text>
  <g class="text small">
    <rect class="box" x="115" y="346" width="180" height="42" rx="8"/><text x="150" y="373">用户认证</text>
    <rect class="box" x="315" y="346" width="180" height="42" rx="8"/><text x="350" y="373">智能问答</text>
    <rect class="box" x="515" y="346" width="180" height="42" rx="8"/><text x="550" y="373">党团流程</text>
    <rect class="box" x="715" y="346" width="180" height="42" rx="8"/><text x="750" y="373">通知推送</text>
    <rect class="box" x="915" y="346" width="180" height="42" rx="8"/><text x="950" y="373">审批流</text>
    <rect class="box" x="315" y="406" width="180" height="42" rx="8"/><text x="350" y="433">电子证明</text>
    <rect class="box" x="515" y="406" width="180" height="42" rx="8"/><text x="550" y="433">学业分析</text>
    <rect class="box" x="715" y="406" width="180" height="42" rx="8"/><text x="750" y="433">文件导入导出</text>
  </g>

  <rect class="box" x="70" y="530" width="1140" height="120" rx="12"/>
  <rect class="head3" x="70" y="530" width="1140" height="42" rx="12"/>
  <text class="white label" x="92" y="559">数据访问层 DAL 与基础设施</text>
  <rect class="box" x="150" y="588" width="260" height="42" rx="8"/><text class="text small" x="205" y="615">Kingbase 数据库</text>
  <rect class="box" x="510" y="588" width="260" height="42" rx="8"/><text class="text small" x="570" y="615">文件存储服务</text>
  <rect class="box" x="870" y="588" width="260" height="42" rx="8"/><text class="text small" x="930" y="615">日志审计服务</text>

  <line class="arrow" x1="640" y1="220" x2="640" y2="278"/>
  <line class="arrow" x1="640" y1="470" x2="640" y2="528"/>
  <text class="text small" x="560" y="248">REST API / HTTPS</text>
  <text class="text small" x="574" y="500">DAO / 文件接口</text>
</svg>
