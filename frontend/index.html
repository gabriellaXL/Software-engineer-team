<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学院学生综合服务与党团管理平台</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 docxtemplater 和 pizzip 用于读取和填充 Word 模板 -->
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <!-- 引入 jszip 和 docx-preview 用于在前端预览 Word 模板 -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.2/dist/docx-preview.min.js"></script>
    <!-- 引入 html2pdf.js 用于将预览内容转为 PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- 引入 EmbedPDF 用于在线预览 PDF -->
    <script src="https://embedpdf.com/embedpdf.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img src="./imgs/logo.png" alt="中国人民大学信息学院" />
          <div>
            <strong>学院学生综合服务与党团管理平台</strong>
            <span>学生事务 · 党团培养 · 智能咨询 · 审批证明</span>
          </div>
        </div>
        <div class="top-actions">
          <div class="role-switch" role="tablist" aria-label="端切换">
            <button type="button" class="is-active" data-role="student" role="tab" aria-selected="true">学生端</button>
            <button type="button" data-role="admin" role="tab" aria-selected="false">管理员端</button>
          </div>
          <button type="button" class="ghost-button" data-action="quick-search" aria-label="快速检索">
            <span data-icon="search"></span>
            快速检索
          </button>
        </div>
      </header>
      <main id="app" class="main-stage" aria-live="polite"></main>
    </div>

    <div class="modal" id="quickSearchModal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="quickSearchTitle">
        <div class="modal-head">
          <div>
            <p class="eyebrow">统一检索</p>
            <h2 id="quickSearchTitle">政策、流程与模板</h2>
          </div>
          <button type="button" class="icon-button" data-action="close-modal" aria-label="关闭">
            <span data-icon="x"></span>
          </button>
        </div>
        <label class="search-field modal-search">
          <span data-icon="search"></span>
          <input id="globalSearchInput" type="search" placeholder="输入关键词，如奖学金、入党、在读证明" />
        </label>
        <div id="globalSearchResults" class="search-results"></div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
